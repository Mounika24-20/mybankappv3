    <form> 
        <center>
        <h2>Customer Registration Form</h2>
        </center>
        <table  align="center" border="1" cellpadding="8" cellspacing="0">
            
            
        <tr>
        <td><label>Customer Name</label></td>
        <td><input type="text"></td>
        </tr>
    

        <tr>
        <td><label>Password</label></td>
        <td><input type="text"></td>
        </tr>
       

        <tr>
        <td><label>Confirm Password</label></td>
        <td><input type="text"></td>
        </tr>
      

        <tr>
        <td><label>Email</label></td>
        <td><input type="email"></td>
        </tr>
    

        <tr>
        <td><label>Mobile</label></td>
        <td><input type="tel"></td>
        </tr>
       

        <tr>
        <td><label>Date of Birth</label></td>
        <td><input type="date"></td>
        </tr>

        <tr>
        <td><label>Gender</label></td>
        <td><input type="radio" value="Male">Male
        <input type="radio" value="Female">Female</td>
        </tr>


        <tr>
        <td><label>Account Type</label></td>
        <td>
        <select>
            <option value="Savings">Savings</option>
        </select>
        </td>
        </tr>
   

        <tr>
        <td><label>Aadhar Number</label></td>
        <td><input type="text"></td>
        </tr>
     

        <tr>
        <td><label>PAN Upload</label></td>
        <td><input type="file"></td>
        </tr>
  

        <tr>
        <td><label>Address</label></td>
        <td><input type="textarea" width="150" height="150"></td>
        </tr>
      

        <tr>
        <td><label>Terms</label></td>
        <td><input type="checkbox" value="I Agree">I Agree</td>
        </tr>
 

       
        <tr>  
            
       <td colspan="2">
        <center>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        </center>
    </td>
        </tr>
          
        
        </table>
    </form>
